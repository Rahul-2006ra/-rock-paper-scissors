<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock · Paper · Scissors</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --rock: #e85d4a;
    --paper: #4a9eff;
    --scissors: #f5c842;
    --win: #4ade80;
    --lose: #f87171;
    --draw: #a78bfa;
    --text: #f0f0f5;
    --muted: #6b6b85;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .glow-orb.one { width: 500px; height: 500px; background: var(--rock); top: -100px; left: -100px; }
  .glow-orb.two { width: 400px; height: 400px; background: var(--paper); bottom: -100px; right: -100px; animation-delay: -4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
    padding: 40px 20px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .round-badge {
    display: inline-block;
    background: var(--border);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.4) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1 span.rock-c { -webkit-text-fill-color: var(--rock); }
  h1 span.paper-c { -webkit-text-fill-color: var(--paper); }
  h1 span.scissors-c { -webkit-text-fill-color: var(--scissors); }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    margin-bottom: 40px;
    align-items: center;
  }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .score-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .score-card.you::before { background: var(--rock); }
  .score-card.computer::before { background: var(--paper); }

  .score-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--text);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .score-num.bump { transform: scale(1.3); }

  .vs-block {
    text-align: center;
  }
  .vs-block .vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    display: block;
  }
  .draw-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .draw-num {
    color: var(--draw);
    font-weight: 500;
  }

  /* Arena */
  .arena {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 24px;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  .arena-side {
    flex: 1;
    text-align: center;
  }
  .arena-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .arena-icon {
    font-size: 72px;
    line-height: 1;
    display: block;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    filter: drop-shadow(0 0 20px rgba(0,0,0,0));
  }
  .arena-icon.reveal { animation: iconReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  @keyframes iconReveal {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .arena-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .arena-divider-line {
    width: 1px;
    height: 60px;
    background: var(--border);
  }
  .arena-divider-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .result-banner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    flex-direction: column;
    gap: 8px;
  }
  .result-banner.show { opacity: 1; pointer-events: auto; }
  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .result-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    animation: resultPop 0.5s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result-text.win { color: var(--win); text-shadow: 0 0 40px var(--win); }
  .result-text.lose { color: var(--lose); text-shadow: 0 0 40px var(--lose); }
  .result-text.draw { color: var(--draw); text-shadow: 0 0 40px var(--draw); }

  @keyframes resultPop {
    from { opacity: 0; transform: translateY(20px) scale(0.8); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Choices */
  .choices-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
  }

  .choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .choice-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 24px 16px 20px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 18px;
  }
  .choice-btn.rock::after   { background: radial-gradient(circle at center, rgba(232,93,74,0.15), transparent 70%); }
  .choice-btn.paper::after  { background: radial-gradient(circle at center, rgba(74,158,255,0.15), transparent 70%); }
  .choice-btn.scissors::after { background: radial-gradient(circle at center, rgba(245,200,66,0.15), transparent 70%); }

  .choice-btn:hover::after, .choice-btn:focus::after { opacity: 1; }
  .choice-btn:hover { transform: translateY(-6px) scale(1.03); }
  .choice-btn.rock:hover   { border-color: var(--rock);     box-shadow: 0 8px 40px rgba(232,93,74,0.3); }
  .choice-btn.paper:hover  { border-color: var(--paper);    box-shadow: 0 8px 40px rgba(74,158,255,0.3); }
  .choice-btn.scissors:hover { border-color: var(--scissors); box-shadow: 0 8px 40px rgba(245,200,66,0.3); }

  .choice-btn:active { transform: translateY(-2px) scale(0.97); }

  .choice-btn .icon { font-size: 44px; line-height: 1; position: relative; z-index: 1; }
  .choice-btn .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }
  .choice-btn.rock .name     { color: var(--rock); }
  .choice-btn.paper .name    { color: var(--paper); }
  .choice-btn.scissors .name { color: var(--scissors); }

  .choice-btn .key-hint {
    font-size: 10px;
    color: var(--muted);
    position: relative;
    z-index: 1;
    background: var(--border);
    border-radius: 6px;
    padding: 2px 8px;
  }

  /* History */
  .history-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .history-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--lose); color: var(--lose); }

  .history-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    min-height: 32px;
  }
  .history-pill {
    background: var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    animation: pillIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }
  .history-pill.win  { background: rgba(74,222,128,0.1);  color: var(--win);  }
  .history-pill.lose { background: rgba(248,113,113,0.1); color: var(--lose); }
  .history-pill.draw { background: rgba(167,139,250,0.1); color: var(--draw); }
  .history-empty { color: var(--muted); font-size: 12px; }

  /* Game Over Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    transform: translateY(40px) scale(0.95);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }
  .modal-trophy { font-size: 72px; display: block; margin-bottom: 16px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    margin-bottom: 8px;
  }
  .modal-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .modal-stat {
    background: var(--bg);
    border-radius: 12px;
    padding: 16px 8px;
  }
  .modal-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    display: block;
  }
  .modal-stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .modal-stat.wins .modal-stat-num  { color: var(--win); }
  .modal-stat.loses .modal-stat-num { color: var(--lose); }
  .modal-stat.draws .modal-stat-num { color: var(--draw); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    width: 100%;
  }
  .btn-primary:hover { transform: scale(1.04); }
  .btn-primary:active { transform: scale(0.97); }

  /* Keyboard hint */
  .kbd-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  kbd {
    background: var(--border);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 11px;
    font-family: inherit;
    color: var(--text);
  }

  /* Confetti */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }
  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 480px) {
    .choices { gap: 10px; }
    .choice-btn { padding: 18px 10px 14px; }
    .choice-btn .icon { font-size: 34px; }
    .arena { padding: 20px; gap: 12px; }
    .arena-icon { font-size: 52px; }
    .result-text { font-size: 36px; }
    .modal { padding: 32px 24px; }
  }
</style>
</head>
<body>

<div class="glow-orb one"></div>
<div class="glow-orb two"></div>

<div class="wrapper">
  <header>
    <div class="round-badge" id="roundBadge">Round 1</div>
    <h1>
      <span class="rock-c">ROCK</span><br>
      <span class="paper-c">PAPER</span><br>
      <span class="scissors-c">SCISSORS</span>
    </h1>
  </header>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card you">
      <div class="score-label">You</div>
      <div class="score-num" id="userScore">0</div>
    </div>
    <div class="vs-block">
      <span class="vs">VS</span>
      <div class="draw-count">Draws: <span class="draw-num" id="drawScore">0</span></div>
    </div>
    <div class="score-card computer">
      <div class="score-label">Computer</div>
      <div class="score-num" id="compScore">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena" id="arena">
    <div class="arena-side">
      <div class="arena-label">Your Pick</div>
      <span class="arena-icon" id="userIcon">🤔</span>
    </div>
    <div class="arena-divider">
      <div class="arena-divider-dot"></div>
      <div class="arena-divider-line"></div>
      <div class="arena-divider-dot"></div>
    </div>
    <div class="arena-side">
      <div class="arena-label">Computer</div>
      <span class="arena-icon" id="compIcon">🤖</span>
    </div>
    <div class="result-banner" id="resultBanner">
      <div class="result-text" id="resultText"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>
  </div>

  <!-- Choice Buttons -->
  <p class="choices-label">Choose your weapon</p>
  <div class="choices">
    <button class="choice-btn rock"     onclick="play(0)" title="Rock (press 1)">
      <span class="icon">✊</span>
      <span class="name">Rock</span>
      <span class="key-hint">Press 1</span>
    </button>
    <button class="choice-btn paper"    onclick="play(1)" title="Paper (press 2)">
      <span class="icon">🖐️</span>
      <span class="name">Paper</span>
      <span class="key-hint">Press 2</span>
    </button>
    <button class="choice-btn scissors" onclick="play(2)" title="Scissors (press 3)">
      <span class="icon">✌️</span>
      <span class="name">Scissors</span>
      <span class="key-hint">Press 3</span>
    </button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <div class="history-title">Round History</div>
      <button class="clear-btn" onclick="resetGame()">New Game</button>
    </div>
    <div class="history-list" id="historyList">
      <span class="history-empty">Your moves will appear here…</span>
    </div>
  </div>

  <p class="kbd-hint"><kbd>1</kbd> Rock &nbsp;·&nbsp; <kbd>2</kbd> Paper &nbsp;·&nbsp; <kbd>3</kbd> Scissors</p>
</div>

<!-- Game Over Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <span class="modal-trophy" id="modalTrophy">🏆</span>
    <div class="modal-title" id="modalTitle">Game Over!</div>
    <div class="modal-subtitle" id="modalSubtitle">Here's how you did</div>
    <div class="modal-stats">
      <div class="modal-stat wins">
        <span class="modal-stat-num" id="finalWins">0</span>
        <span class="modal-stat-label">Wins</span>
      </div>
      <div class="modal-stat loses">
        <span class="modal-stat-num" id="finalLoses">0</span>
        <span class="modal-stat-label">Losses</span>
      </div>
      <div class="modal-stat draws">
        <span class="modal-stat-num" id="finalDraws">0</span>
        <span class="modal-stat-label">Draws</span>
      </div>
    </div>
    <button class="btn-primary" onclick="resetGame()">Play Again</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  const icons   = ['✊','🖐️','✌️'];
  const names   = ['Rock','Paper','Scissors'];
  const beats   = { 0:2, 1:0, 2:1 }; // user choice beats this computer choice
  const colors  = ['#e85d4a','#4a9eff','#f5c842'];

  let userWins = 0, compWins = 0, draws = 0, round = 1;
  let busy = false;

  const userScoreEl = document.getElementById('userScore');
  const compScoreEl = document.getElementById('compScore');
  const drawScoreEl = document.getElementById('drawScore');
  const userIconEl  = document.getElementById('userIcon');
  const compIconEl  = document.getElementById('compIcon');
  const resultBanner= document.getElementById('resultBanner');
  const resultText  = document.getElementById('resultText');
  const resultSub   = document.getElementById('resultSub');
  const historyList = document.getElementById('historyList');
  const roundBadge  = document.getElementById('roundBadge');

  function play(choice) {
    if (busy) return;
    busy = true;

    const compChoice = Math.floor(Math.random() * 3);

    // Animate choosing phase
    userIconEl.classList.remove('reveal');
    compIconEl.classList.remove('reveal');
    resultBanner.classList.remove('show');

    userIconEl.textContent = '❓';
    compIconEl.textContent = '❓';

    // Fake "thinking" shake
    let ticks = 0;
    const shake = setInterval(() => {
      userIconEl.textContent = icons[Math.floor(Math.random()*3)];
      compIconEl.textContent = icons[Math.floor(Math.random()*3)];
      if (++ticks > 8) {
        clearInterval(shake);
        revealResult(choice, compChoice);
      }
    }, 80);
  }

  function revealResult(u, c) {
    userIconEl.textContent = icons[u];
    compIconEl.textContent = icons[c];
    userIconEl.classList.add('reveal');
    compIconEl.classList.add('reveal');

    setTimeout(() => {
      let outcome, cls, sub;
      if (u === c) {
        outcome = "DRAW!"; cls = "draw"; sub = `Both chose ${names[u]}`;
        draws++;
        bumpScore(drawScoreEl, draws, '#a78bfa');
      } else if (beats[u] === c) {
        outcome = "YOU WIN!"; cls = "win"; sub = `${names[u]} beats ${names[c]}`;
        userWins++;
        bumpScore(userScoreEl, userWins, '#4ade80');
        launchConfetti();
      } else {
        outcome = "YOU LOSE"; cls = "lose"; sub = `${names[c]} beats ${names[u]}`;
        compWins++;
        bumpScore(compScoreEl, compWins, '#f87171');
      }

      resultText.textContent = outcome;
      resultText.className = `result-text ${cls}`;
      resultSub.textContent = sub;
      resultBanner.classList.add('show');

      addHistory(u, c, cls);
      round++;
      roundBadge.textContent = `Round ${round}`;

      // Check for game over at 5 wins
      if (userWins >= 5 || compWins >= 5) {
        setTimeout(showModal, 1400);
      } else {
        setTimeout(() => {
          resultBanner.classList.remove('show');
          busy = false;
        }, 1600);
      }
    }, 300);
  }

  function bumpScore(el, val, color) {
    el.textContent = val;
    el.classList.add('bump');
    el.style.color = color;
    setTimeout(() => { el.classList.remove('bump'); el.style.color = ''; }, 400);
  }

  function addHistory(u, c, cls) {
    const empties = historyList.querySelectorAll('.history-empty');
    empties.forEach(e => e.remove());
    const pill = document.createElement('div');
    pill.className = `history-pill ${cls}`;
    pill.innerHTML = `${icons[u]}<span style="opacity:.5;font-size:10px">vs</span>${icons[c]}`;
    historyList.appendChild(pill);
    // keep last 20
    const pills = historyList.querySelectorAll('.history-pill');
    if (pills.length > 20) pills[0].remove();
  }

  function showModal() {
    document.getElementById('finalWins').textContent  = userWins;
    document.getElementById('finalLoses').textContent = compWins;
    document.getElementById('finalDraws').textContent = draws;
    const titleEl = document.getElementById('modalTitle');
    const trophyEl= document.getElementById('modalTrophy');
    const subEl   = document.getElementById('modalSubtitle');
    if (userWins > compWins) {
      trophyEl.textContent = '🏆';
      titleEl.textContent  = 'You Won!';
      titleEl.style.color  = '#4ade80';
      subEl.textContent    = 'Congratulations, Champion!';
    } else if (compWins > userWins) {
      trophyEl.textContent = '💻';
      titleEl.textContent  = 'Computer Won';
      titleEl.style.color  = '#f87171';
      subEl.textContent    = 'Better luck next time!';
    } else {
      trophyEl.textContent = '🤝';
      titleEl.textContent  = "It's a Tie!";
      titleEl.style.color  = '#a78bfa';
      subEl.textContent    = 'Evenly matched!';
    }
    document.getElementById('modalOverlay').classList.add('show');
    busy = false;
  }

  function resetGame() {
    userWins = compWins = draws = 0;
    round = 1;
    userScoreEl.textContent = '0';
    compScoreEl.textContent = '0';
    drawScoreEl.textContent = '0';
    userIconEl.textContent = '🤔';
    compIconEl.textContent = '🤖';
    resultBanner.classList.remove('show');
    historyList.innerHTML = '<span class="history-empty">Your moves will appear here…</span>';
    roundBadge.textContent = 'Round 1';
    document.getElementById('modalOverlay').classList.remove('show');
    busy = false;
  }

  function launchConfetti() {
    const container = document.getElementById('confetti');
    const confettiColors = ['#e85d4a','#4a9eff','#f5c842','#4ade80','#a78bfa','#fff'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
      piece.style.width = (Math.random() * 10 + 6) + 'px';
      piece.style.height = (Math.random() * 10 + 6) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const dur = (Math.random() * 1.5 + 1.5).toFixed(2);
      piece.style.animationDuration = dur + 's';
      piece.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), (parseFloat(dur) + 1) * 1000);
    }
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key === '1') play(0);
    if (e.key === '2') play(1);
    if (e.key === '3') play(2);
  });
</script>
</body>
</html>
